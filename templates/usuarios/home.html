<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>UniRide</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #007bff, #00c6ff);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 120px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 40px;
        }

        .btn {
            display: block;
            width: 250px;
            margin: 10px auto;
            padding: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
        }

        .login {
            background: white;
            color: #007bff;
        }

        .register {
            background: #28a745;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>UniRide 🚗</h1>
    <p>Viaja fácil, rápido y seguro</p>

    <a href="{% url 'login' %}" class="btn login">Iniciar Sesión</a>
    <a href="{% url 'registro' %}" class="btn register">Registrarse</a>
</div>

</body>
</html>
