<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Rutas</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        h1 {
            color: #2c3e50;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background: #2980b9;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .btn:hover {
            background: #1f5f85;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🛣️ Mis Rutas</h1>

    <a class="btn" href="{% url 'crear_ruta' %}">+ Agregar Ruta</a>

    {% for r in rutas %}
        <div class="card">
            <h3>{{ r.origen }} → {{ r.destino }}</h3>
            <p><b>Conductor:</b> {{ r.conductor }}</p>
        </div>
    {% empty %}
        <p>No tienes rutas registradas.</p>
    {% endfor %}

</div>

</body>
</html>
