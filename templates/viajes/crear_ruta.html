{% extends 'inicio_base.html' %}

{% block menu %}
<style>
    /* 1. LIBERAR EL CONTENEDOR DEL BASE */
    .container {
        max-width: 100% !important;
        width: 100% !important;
        margin: 0 !important;
        text-align: left !important;
    }

    .menu {
        width: 90% !important;
        max-width: 1000px !important;
        margin: 0 auto !important;
        display: block !important;
    }

    /* 2. ESTILOS DEL FORMULARIO */
    .create-route-container {
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        margin-top: 30px;
    }

    h2 { margin-bottom: 30px; font-weight: bold; color: #1a1a1a; text-align: center; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }
    
    .input-map-group {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 15px;
    }

    input { 
        flex: 1; 
        padding: 12px; 
        border: 1px solid #ddd; 
        border-radius: 10px; 
        font-size: 15px;
    }

    .btn-map {
        background: #f3f0ff;
        color: #7b5cff;
        border: 1px solid #7b5cff;
        padding: 12px 15px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .btn-map:hover { background: #7b5cff; color: white; }

    .btn-remove {
        background: #fee2e2;
        color: #ef4444;
        border: 1px solid #ef4444;
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
    }

    .intermedio-section {
        background: #fcfcfc;
        padding: 25px;
        border-radius: 15px;
        border: 1px dashed #ccc;
        margin-top: 30px;
    }

    .btn-add-punto {
        background: #27ae60;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    .actions {
        display: flex;
        justify-content: space-between;
        margin-top: 40px;
        padding-top: 20px;
        border-top: 1px solid #eee;
    }

    .btn-save { background: #7b5cff; color: white; padding: 14px 40px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .btn-cancel { background: #f0f0f0; color: #333; padding: 14px 40px; border-radius: 10px; text-decoration: none; font-weight: bold; display: inline-block; }

    /* Modal Mapa */
    .modal-map {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.8);
        z-index: 2000;
        justify-content: center;
        align-items: center;
    }

    .map-content {
        background: white;
        width: 80%;
        height: 70%;
        border-radius: 20px;
        padding: 20px;
        position: relative;
        text-align: center;
    }
</style>

<div class="create-route-container">
    <h2>➕ Registrar Nueva Ruta</h2>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Nombre de la Ruta</label>
            <input type="text" name="nombre" placeholder="Ej: Casa-Trabajo" required>
        </div>

        <div class="form-group">
            <label>Origen</label>
            <div class="input-map-group">
                <input type="text" name="origen" placeholder="Punto de inicio" required>
                <button type="button" class="btn-map" onclick="verMapa('Origen')">📍 Mapa</button>
            </div>
        </div>

        <div class="form-group">
            <label>Destino</label>
            <div class="input-map-group">
                <input type="text" name="destino" placeholder="Punto final" required>
                <button type="button" class="btn-map" onclick="verMapa('Destino')">📍 Mapa</button>
            </div>
        </div>

        <div class="intermedio-section">
            <label>Puntos Intermedios (Opcional)</label>
            <div id="puntos-container">
                </div>
            <button type="button" class="btn-add-punto" onclick="agregarInputPunto()">+ Añadir Parada</button>
        </div>

        <div class="actions">
            <button type="submit" class="btn-save">Guardar Ruta</button>
            <a href="{% url 'lista_rutas' %}" class="btn-cancel">Cancelar</a>
        </div>
    </form>
</div>

<div id="modal-mapa" class="modal-map" onclick="cerrarMapa()">
    <div class="map-content" onclick="event.stopPropagation()">
        <h2 id="map-title">🗺️ Seleccionando Ubicación</h2>
        <div style="width: 100%; height: 300px; background: #eee; display: flex; align-items: center; justify-content: center; border-radius: 10px;">
            <p>El mapa se cargará aquí próximamente.</p>
        </div>
        <button class="btn-save" style="margin-top:20px" onclick="cerrarMapa()">Confirmar</button>
    </div>
</div>

<script>
    function agregarInputPunto() {
        const container = document.getElementById('puntos-container');
        const div = document.createElement('div');
        div.className = 'input-map-group';
        div.innerHTML = `
            <input type="text" name="puntos_nombres" placeholder="Nombre de la parada" required>
            <button type="button" class="btn-map" onclick="verMapa('Parada')">📍 Mapa</button>
            <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>
        `;
        container.appendChild(div);
    }

    function verMapa(tipo) {
        document.getElementById('map-title').innerText = '🗺️ Ubicación de ${tipo}';
        document.getElementById('modal-mapa').style.display = 'flex';
    }

    function cerrarMapa() {
        document.getElementById('modal-mapa').style.display = 'none';
    }
</script>
{% endblock %}
