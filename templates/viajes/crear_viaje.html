<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Publicar Viaje</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        h1 {
            color: #2c3e50;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background: #219150;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🚗 Publicar Viaje</h1>

    <div class="card">

        <form method="POST">
            {% csrf_token %}

            <label>Ruta</label>
            <select name="ruta">
                {% for r in rutas %}
                    <option value="{{ r.id }}">{{ r.origen }} → {{ r.destino }}</option>
                {% endfor %}
            </select>

            <label>Vehículo</label>
            <select name="vehiculo">
                {% for v in vehiculos %}
                    <option value="{{ v.id }}">{{ v.marca }} {{ v.modelo }}</option>
                {% endfor %}
            </select>

            <label>Fecha</label>
            <input type="date" name="fecha">

            <label>Hora</label>
            <input type="time" name="hora">

            <label>Asientos disponibles</label>
            <input type="number" name="asientos">

            <label>Precio</label>
            <input type="number" step="0.01" name="precio">

            <button class="btn" type="submit">Publicar Viaje</button>
        </form>

    </div>

</div>

</body>
</html>
